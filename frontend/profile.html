<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AURA — Profile</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#090c14" />
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
<script>
  (function () {
    var stored = localStorage.getItem("aura_theme");
    var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="assets/css/global.css" />
<link rel="stylesheet" href="assets/css/chat.css" />
<link rel="stylesheet" href="assets/css/profile.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="aura-mark" style="width:20px;height:20px;">
          <svg viewBox="0 0 40 40" width="20" height="20">
            <defs>
              <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2dd4bf"/>
                <stop offset="50%" stop-color="#8b7ff5"/>
                <stop offset="100%" stop-color="#f472b6"/>
              </linearGradient>
            </defs>
            <circle cx="20" cy="20" r="17" fill="none" stroke="url(#sidebarGrad)" stroke-width="3"/>
          </svg>
        </div>
        <h2>AURA</h2>
      </div>
      <a href="chat.html" class="btn btn-ghost new-chat-btn" style="text-align:center;text-decoration:none;display:block;">← Back to chat</a>
      <div class="sidebar-footer" style="margin-top:auto;">
        <div id="user-label">User</div>
        <button id="theme-toggle-btn" class="btn btn-ghost theme-toggle-btn" style="margin-top:10px;width:100%;">
          <span class="theme-toggle-icon">☀️</span>
          <span class="theme-toggle-label">Light mode</span>
        </button>
        <button id="logout-btn" class="btn btn-ghost" style="margin-top:8px;width:100%;">Log out</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="brand-row">
          <button type="button" id="sidebar-toggle" class="hamburger-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <strong>Profile & Settings</strong>
        </div>
      </header>

      <div class="profile-workspace">
        <!-- Avatar -->
        <section class="profile-card">
          <h3>Profile photo</h3>
          <div class="avatar-row">
            <div class="avatar-preview" id="avatar-preview">
              <img id="avatar-img" src="" alt="" hidden />
              <span id="avatar-initial">?</span>
            </div>
            <div class="avatar-actions">
              <input type="file" id="avatar-input" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
              <button type="button" id="avatar-upload-btn" class="btn btn-ghost">Change photo</button>
              <p class="field-hint">PNG, JPG, WEBP or GIF. Up to 5MB.</p>
            </div>
          </div>
        </section>

        <!-- Name -->
        <section class="profile-card">
          <h3>Your name</h3>
          <form id="name-form" class="profile-form">
            <input type="text" id="name-input" placeholder="Your name" required />
            <p class="field-hint" id="email-display"></p>
            <button type="submit" class="btn btn-primary">Save name</button>
            <p class="form-message" id="name-message"></p>
          </form>
        </section>

        <!-- Password -->
        <section class="profile-card">
          <h3>Change password</h3>
          <form id="password-form" class="profile-form">
            <input type="password" id="current-password-input" placeholder="Current password" required autocomplete="current-password" />
            <input type="password" id="new-password-input" placeholder="New password (min 6 characters)" required autocomplete="new-password" />
            <input type="password" id="confirm-password-input" placeholder="Confirm new password" required autocomplete="new-password" />
            <button type="submit" class="btn btn-primary">Update password</button>
            <p class="form-message" id="password-message"></p>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/sw-register.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
