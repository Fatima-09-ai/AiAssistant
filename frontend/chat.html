<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AURA</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#090c14" />
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
<script>
  (function () {
    var stored = localStorage.getItem("aura_theme");
    var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="assets/css/global.css" />
<link rel="stylesheet" href="assets/css/chat.css" />
<link rel="stylesheet" id="hljs-theme-dark" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
<link rel="stylesheet" id="hljs-theme-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" disabled />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div id="sidebar-mark" class="aura-mark" style="width:20px;height:20px;">
          <svg viewBox="0 0 40 40" width="20" height="20">
            <defs>
              <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2dd4bf"/>
                <stop offset="50%" stop-color="#8b7ff5"/>
                <stop offset="100%" stop-color="#f472b6"/>
              </linearGradient>
            </defs>
            <circle cx="20" cy="20" r="17" fill="none" stroke="url(#sidebarGrad)" stroke-width="3"/>
          </svg>
        </div>
        <h2>AURA</h2>
      </div>
      <button id="new-chat-btn" class="btn btn-primary new-chat-btn">+ New chat</button>
      <input type="text" id="conversation-search" class="conversation-search" placeholder="Search chats..." />
      <div id="conversation-list" class="conversation-list"></div>
      <div class="sidebar-footer">
        <a href="notes.html" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:block;margin-bottom:8px;">📝 Notes & Todos</a>
        <a href="admin.html" id="admin-link" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:none;margin-bottom:8px;">🛡️ Admin panel</a>
        <a href="profile.html" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:block;margin-bottom:8px;">⚙️ Profile</a>
        <a href="memories.html" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:block;margin-bottom:8px;">🧠 Memory</a>
        <div id="user-label">User</div>
        <button id="theme-toggle-btn" class="btn btn-ghost theme-toggle-btn" style="margin-top:10px;width:100%;">
          <span class="theme-toggle-icon">☀️</span>
          <span class="theme-toggle-label">Light mode</span>
        </button>
        <button id="logout-btn" class="btn btn-ghost" style="margin-top:8px;width:100%;">Log out</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="brand-row">
          <button type="button" id="sidebar-toggle" class="hamburger-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <div id="header-mark" class="aura-mark" style="width:18px;height:18px;">
            <svg viewBox="0 0 40 40" width="18" height="18">
              <defs>
                <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#2dd4bf"/>
                  <stop offset="50%" stop-color="#8b7ff5"/>
                  <stop offset="100%" stop-color="#f472b6"/>
                </linearGradient>
              </defs>
              <circle cx="20" cy="20" r="17" fill="none" stroke="url(#headerGrad)" stroke-width="3"/>
            </svg>
          </div>
          <strong>AURA</strong>
        </div>
        <div style="display:flex;align-items:center;gap:14px;">
          <span id="status-label" class="status-label">Idle</span>
          <div class="model-toggle" id="model-toggle" title="Smart: better reasoning. Fast: quicker replies.">
            <button type="button" class="model-option active" data-model="smart">✨ Smart</button>
            <button type="button" class="model-option" data-model="fast">⚡ Fast</button>
          </div>
          <div class="export-menu">
            <button id="export-btn" class="btn btn-ghost export-btn" disabled>Export</button>
            <div id="export-options" class="export-options">
              <button data-format="txt">Download as .txt</button>
              <button data-format="pdf">Download as .pdf</button>
            </div>
          </div>
          <div class="share-menu">
            <button id="share-btn" class="btn btn-ghost share-btn" disabled>🔗 Share</button>
            <div id="share-panel" class="share-panel">
              <div id="share-panel-start">
                <p class="share-panel-hint">Anyone with the link can view this chat, read-only — no login needed. It always shows the latest messages.</p>
                <button type="button" id="share-get-link-btn" class="btn btn-primary">Get share link</button>
              </div>
              <div id="share-panel-link" hidden>
                <input type="text" id="share-link-input" readonly />
                <div class="share-panel-actions">
                  <button type="button" id="share-copy-btn" class="btn btn-ghost">Copy</button>
                  <button type="button" id="share-revoke-btn" class="btn btn-ghost">Stop sharing</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <div id="attachment-preview" class="attachment-preview" hidden></div>

      <form id="composer-form" class="composer">
        <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.webp,.gif,.pdf,.docx,.txt,.csv,.md" hidden />
        <button type="button" id="attach-btn" class="attach-btn" title="Attach a file">📎</button>
        <textarea id="message-input" rows="1" placeholder="Message AURA..."></textarea>
        <button type="button" id="mic-btn" class="mic-btn" title="Speak">🎤</button>
        <button type="submit" id="send-btn" class="send-btn" title="Send" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="6 11 12 5 18 11"></polyline>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/sw-register.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/voice.js"></script>
  <script src="assets/js/chat.js"></script>
</body>
</html>
