<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AURA — Log in</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#090c14" />
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
<script>
  (function () {
    var stored = localStorage.getItem("aura_theme");
    var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="assets/css/global.css" />
</head>
<body>
  <button id="theme-toggle-btn" class="btn btn-ghost theme-toggle-btn" style="position:fixed;top:20px;right:20px;">
    <span class="theme-toggle-icon">☀️</span>
  </button>
  <div class="auth-page">
    <form id="login-form" class="glass auth-card">
      <div class="aura-mark" style="width:26px;height:26px;">
        <svg viewBox="0 0 40 40" width="26" height="26">
          <defs>
            <linearGradient id="loginGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2dd4bf"/>
              <stop offset="50%" stop-color="#8b7ff5"/>
              <stop offset="100%" stop-color="#f472b6"/>
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="17" fill="none" stroke="url(#loginGrad)" stroke-width="3"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p class="sub">Log in to pick up where you left off.</p>
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <div id="form-error" class="error-text"></div>
      <button type="submit" class="btn btn-primary">Log in</button>
      <p class="sub">No account yet? <a href="signup.html">Sign up</a></p>
    </form>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/sw-register.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
