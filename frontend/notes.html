<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AURA — Notes & Todos</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#060512" />
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
<script>
  (function () {
    var stored = localStorage.getItem("aura_theme");
    var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="assets/css/global.css" />
<link rel="stylesheet" href="assets/css/chat.css" />
<link rel="stylesheet" href="assets/css/notes.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="aura-mark" style="width:20px;height:20px;">
          <svg viewBox="0 0 40 40" width="20" height="20">
            <defs>
              <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00e5ff"/>
                <stop offset="50%" stop-color="#b537f2"/>
                <stop offset="100%" stop-color="#ff2e9a"/>
              </linearGradient>
            </defs>
            <circle cx="20" cy="20" r="17" fill="none" stroke="url(#sidebarGrad)" stroke-width="3"/>
          </svg>
        </div>
        <h2>AURA</h2>
      </div>
      <a href="chat.html" class="btn btn-ghost new-chat-btn" style="text-align:center;text-decoration:none;display:block;">← Back to chat</a>
      <div class="sidebar-footer" style="margin-top:auto;">
        <a href="bookmarks.html" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:block;margin-bottom:8px;">⭐ Bookmarks</a>
        <a href="profile.html" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:block;margin-bottom:8px;">⚙️ Profile</a>
        <a href="memories.html" class="btn btn-ghost" style="width:100%;text-align:center;text-decoration:none;display:block;margin-bottom:8px;">🧠 Memory</a>
        <div id="user-label">User</div>
        <button id="theme-toggle-btn" class="btn btn-ghost theme-toggle-btn" style="margin-top:10px;width:100%;">
          <span class="theme-toggle-icon">☀️</span>
          <span class="theme-toggle-label">Light mode</span>
        </button>
        <button id="logout-btn" class="btn btn-ghost" style="margin-top:8px;width:100%;">Log out</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="brand-row">
          <button type="button" id="sidebar-toggle" class="hamburger-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <strong>Notes & Todos</strong>
        </div>
        <div class="notes-tabs">
          <button class="notes-tab active" data-tab="notes">Notes</button>
          <button class="notes-tab" data-tab="todos">Todos</button>
        </div>
      </header>

      <div class="notes-workspace">
        <!-- NOTES TAB -->
        <section id="notes-panel" class="panel">
          <form id="note-form" class="note-form">
            <input type="text" id="note-title-input" placeholder="Title (optional)" />
            <textarea id="note-content-input" rows="3" placeholder="Write a note..."></textarea>
            <button type="submit" class="btn btn-primary">+ Add note</button>
          </form>
          <div id="notes-grid" class="notes-grid"></div>
        </section>

        <!-- TODOS TAB -->
        <section id="todos-panel" class="panel" hidden>
          <form id="todo-form" class="todo-form">
            <input type="text" id="todo-text-input" placeholder="Add a todo..." />
            <input type="date" id="todo-date-input" />
            <button type="submit" class="btn btn-primary">+ Add</button>
          </form>
          <div id="todos-list" class="todos-list"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/sw-register.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/notes.js"></script>
</body>
</html>
