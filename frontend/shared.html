<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shared chat — AURA</title>
<meta name="theme-color" content="#090c14" />
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
<script>
  (function () {
    var stored = localStorage.getItem("aura_theme");
    var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="assets/css/global.css" />
<link rel="stylesheet" href="assets/css/chat.css" />
<link rel="stylesheet" href="assets/css/shared.css" />
<link rel="stylesheet" id="hljs-theme-dark" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
<link rel="stylesheet" id="hljs-theme-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" disabled />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="shared-shell">
    <header class="shared-header">
      <div class="brand-row">
        <div class="aura-mark" style="width:20px;height:20px;">
          <svg viewBox="0 0 40 40" width="20" height="20">
            <defs>
              <linearGradient id="sharedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2dd4bf"/>
                <stop offset="50%" stop-color="#8b7ff5"/>
                <stop offset="100%" stop-color="#f472b6"/>
              </linearGradient>
            </defs>
            <circle cx="20" cy="20" r="17" fill="none" stroke="url(#sharedGrad)" stroke-width="3"/>
          </svg>
        </div>
        <strong>AURA</strong>
        <span class="shared-badge">Shared chat · read-only</span>
      </div>
      <button type="button" id="theme-toggle-btn" class="btn btn-ghost theme-toggle-btn">
        <span class="theme-toggle-icon">☀️</span>
        <span class="theme-toggle-label">Light mode</span>
      </button>
    </header>

    <div id="shared-title" class="shared-title"></div>

    <div id="shared-messages" class="shared-messages"></div>

    <div id="shared-error" class="shared-error" hidden>
      <p>This shared chat isn't available. The link may be wrong, or whoever shared it turned sharing back off.</p>
    </div>

    <footer class="shared-footer">
      <span>This is a read-only copy of someone's conversation with AURA.</span>
      <a href="signup.html" class="btn btn-primary">Try AURA</a>
    </footer>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/sw-register.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/shared.js"></script>
</body>
</html>
